services:
  - type: web
    name: multiagent-system
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: LLM_PROVIDER
        value: open_source
      - key: LLM_MODEL
        value: mistral
      - key: LLM_BASE_URL
        value: http://localhost:11434
